<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALSA · Rutas y Horarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="main-header" style="background:linear-gradient(135deg,#1a56db 0%,#2563eb 100%);position:static;margin-bottom:0;border-bottom:0">
    <div class="header-left" style="justify-content:center;width:100%">
      <div class="logo-combo">
        <img src="img/logo.png" alt="Icono" class="logo-icon" style="filter:brightness(10)">
        <img src="img/nombre_logo.png" alt="ALSA" class="logo-nombre" style="filter:brightness(10)">
      </div>
    </div>
  </header>

  <!-- Search Section -->
  <main style="max-width:720px;margin:0 auto;padding:32px 24px">
    <div class="card" style="margin-bottom:24px">
      <h2 style="font-size:1.25rem;font-weight:700;color:var(--gray-900);margin:0 0 4px">Buscar rutas y horarios</h2>
      <p style="font-size:0.875rem;color:var(--gray-400);margin:0 0 24px">Selecciona origen, destino y fecha para consultar disponibilidad</p>

      <div style="margin-bottom:18px">
        <span class="form-sec-label">Tipo de trayecto</span>
        <div class="seg-ctrl" id="home-seg">
          <button class="seg-btn active" onclick="selectTripType('ida',this)">Ida</button>
          <button class="seg-btn" onclick="selectTripType('idayvuelta',this)">Ida y vuelta</button>
        </div>
      </div>

      <div style="margin-bottom:18px">
        <span class="form-sec-label">Ruta</span>
        <div class="form-grid">
          <div class="form-group" style="margin-bottom:0;position:relative">
            <label class="form-label" style="font-size:0.8125rem">Puerto de origen</label>
            <input type="text" class="form-input" id="h-origen" placeholder="Escribe para buscar..." autocomplete="off"
              oninput="filterRoutes('origen')" onfocus="filterRoutes('origen')" onblur="setTimeout(()=>hideDropdown('drop-origen'),180)">
            <div class="route-dropdown" id="drop-origen"></div>
            <input type="hidden" id="h-origen-id" value="">
            <span class="error-msg" id="e-origen"></span>
          </div>
          <div class="form-group" style="margin-bottom:0;position:relative">
            <label class="form-label" style="font-size:0.8125rem">Puerto de destino</label>
            <input type="text" class="form-input" id="h-destino" placeholder="Selecciona primero el origen..." autocomplete="off"
              oninput="filterRoutes('destino')" onfocus="filterRoutes('destino')" onblur="setTimeout(()=>hideDropdown('drop-destino'),180)">
            <div class="route-dropdown" id="drop-destino"></div>
            <input type="hidden" id="h-destino-id" value="">
            <span class="error-msg" id="e-destino"></span>
          </div>
        </div>
      </div>

      <div style="margin-bottom:22px">
        <span class="form-sec-label">Fechas</span>
        <div class="form-grid">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label" style="font-size:0.8125rem">Fecha de ida</label>
            <input type="date" class="form-input" id="h-fecha-ida" value="">
            <span class="error-msg" id="e-fecha-ida"></span>
          </div>
          <div class="form-group" id="g-vuelta" style="margin-bottom:0;opacity:0.4;pointer-events:none">
            <label class="form-label" style="font-size:0.8125rem">Fecha de vuelta</label>
            <input type="date" class="form-input" id="h-fecha-vuelta" value="">
            <span class="error-msg" id="e-fecha-vuelta"></span>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%;padding:11px 32px;font-size:1rem" onclick="doSearchSailings()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Buscar disponibilidad
      </button>
    </div>

    <!-- Results -->
    <div id="results-area"></div>
  </main>

  <script src="app.js"></script>
  <script>
    // Set min date to today
    document.addEventListener('DOMContentLoaded', function() {
      var today = new Date().toISOString().split('T')[0];
      var idaEl = document.getElementById('h-fecha-ida');
      if (idaEl) {
        idaEl.min = today;
        idaEl.addEventListener('change', function() {
          var vuelEl = document.getElementById('h-fecha-vuelta');
          if (vuelEl && idaEl.value) {
            vuelEl.min = idaEl.value;
            if (vuelEl.value && vuelEl.value < idaEl.value) vuelEl.value = idaEl.value;
          }
        });
      }
    });
  </script>
</body>
</html>
